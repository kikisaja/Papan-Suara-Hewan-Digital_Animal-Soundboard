<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papan Suara Hewan Ceria 🐱🎵</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="soundboard-container">
        <header class="board-header">
            <h1>🎵 SOUNDBOARD HEWAN</h1>
            <p>Klik kotak hewan di bawah untuk mendengarkan efek suara uniknya!</p>
        </header>

        <div class="sound-grid">
            <button class="animal-card card-pink" data-animal="kucing">
                <span class="emoji">🐱</span>
                <span class="name">Kucing</span>
            </button>

            <button class="animal-card card-blue" data-animal="burung">
                <span class="emoji">🐦</span>
                <span class="name">Burung</span>
            </button>

            <button class="animal-card card-yellow" data-animal="anjing">
                <span class="emoji">🐶</span>
                <span class="name">Anjing</span>
            </button>

            <button class="animal-card card-green" data-animal="kodok">
                <span class="emoji">🐸</span>
                <span class="name">Kodok</span>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
